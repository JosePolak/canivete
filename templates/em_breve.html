{% extends "base.html" %}

{% block content %}
<h2 style="text-align: left; margin-top: 30px; margin-bottom: 20px; color: #333; font-weight: bold;">
    {{ titulo }}
</h2>

<hr style="border: 0; border-top: 1px solid #ccc; margin-bottom: 40px;">

<div style="text-align: center; padding: 40px 0;">
    <span style="font-size: 4rem;">🛠️</span>
    <h3 style="margin-top: 20px; color: #555;">Esta funcionalidade está a caminho</h3>
    <p style="color: #777; font-style: italic;">O Canivete está ganhando novas ferramentas. Volte em breve!</p>

    <div style="margin-top: 50px;">
        <a href="{{ url_for('moedas.home') }}"

            ← Voltar para Moedas

    </div>
